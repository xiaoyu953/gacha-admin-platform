# ============================================================
# Gacha Admin Platform — Local Development Stack
# ============================================================
# Usage:
#   docker compose up -d                    # start all services
#   docker compose up -d --build            # rebuild images before starting
#   docker compose logs -f auth-service     # tail logs of one service
#   docker compose down -v                  # stop everything, remove volumes
# ============================================================

services:
  # ---------- Infrastructure ----------

  nacos:
    image: nacos/nacos-server:v2.3.2
    platform: linux/amd64
    container_name: gacha-nacos
    environment:
      MODE: standalone
      PREFER_HOST_MODE: hostname
    ports:
      - "8848:8848"
      - "9848:9848"
    volumes:
      - nacos-data:/home/nacos/data
    healthcheck:
      test: curl -f http://localhost:8848/nacos/v1/console/health/readiness || exit 1
      interval: 15s
      timeout: 5s
      retries: 10

  mysql:
    image: mysql:8.0
    platform: linux/amd64
    container_name: gacha-mysql
    environment:
      MYSQL_ROOT_PASSWORD: admin123
    ports:
      - "3307:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: mysqladmin ping -h localhost -u root -padmin123
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: gacha-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: redis-cli ping
      interval: 10s
      timeout: 3s
      retries: 5

  # ---------- Java Microservices ----------

  auth-service:
    build:
      context: .
      dockerfile: docker/Dockerfile
      args:
        SERVICE_NAME: auth-service
    container_name: gacha-auth-service
    ports:
      - "8100:8100"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/auth_svc?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: admin123
      SPRING_REDIS_HOST: redis
      SPRING_CLOUD_NACOS_DISCOVERY_SERVER-ADDR: nacos:8848
    depends_on:
      mysql:
        condition: service_healthy
      nacos:
        condition: service_healthy
      redis:
        condition: service_healthy

  gateway-service:
    build:
      context: .
      dockerfile: docker/Dockerfile
      args:
        SERVICE_NAME: gateway-service
    container_name: gacha-gateway
    ports:
      - "8080:8080"
    environment:
      SPRING_CLOUD_NACOS_DISCOVERY_SERVER-ADDR: nacos:8848
      SPRING_REDIS_HOST: redis
    depends_on:
      nacos:
        condition: service_healthy
      auth-service:
        condition: service_started

  content-service:
    build:
      context: .
      dockerfile: docker/Dockerfile
      args:
        SERVICE_NAME: content-service
    container_name: gacha-content-service
    ports:
      - "8101:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/content_svc?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: admin123
      SPRING_REDIS_HOST: redis
      SPRING_CLOUD_NACOS_DISCOVERY_SERVER-ADDR: nacos:8848
    depends_on:
      mysql:
        condition: service_healthy
      nacos:
        condition: service_healthy

  # ---------- Frontend ----------

  admin-frontend:
    build:
      context: ./admin-frontend
      dockerfile: Dockerfile
    container_name: gacha-admin-frontend
    ports:
      - "80:80"
    depends_on:
      - gateway-service

volumes:
  nacos-data:
  mysql-data:
  redis-data:
