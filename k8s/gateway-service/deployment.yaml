apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway-service
  namespace: gacha-system
  labels:
    app: gateway-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: gateway-service
  template:
    metadata:
      labels:
        app: gateway-service
    spec:
      containers:
        - name: gateway-service
          image: registry.example.com/gacha/gateway-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              protocol: TCP
          envFrom:
            - configMapRef:
                name: gacha-common-config
            - secretRef:
                name: gacha-credentials
          env:
            - name: SPRING_CLOUD_NACOS_DISCOVERY_SERVER-ADDR
              valueFrom:
                configMapKeyRef:
                  name: gacha-common-config
                  key: NACOS_SERVER_ADDR
            - name: JAVA_OPTS
              value: "-XX:+UseContainerSupport -XX:MaxRAMPercentage=75.0"
          resources:
            requests:
              cpu: 200m
              memory: 384Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 20
      restartPolicy: Always
